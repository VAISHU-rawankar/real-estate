services:
  # --- Backend API (Node.js) ---
  - type: web
    name: realestate-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromDatabase:
          name: realestate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: realestate-cache
          property: connectionString
      - key: CLIENT_URL
        value: https://real-estate-alpha-gilt-24.vercel.app
      - key: GEMINI_API_KEY
        value: AIzaSyCQ2ThiZHK9Vjk-KX4Jgsr54G_qWlIoLOM
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # --- Frontend (Static Site) ---
  # Note: You can also use Vercel for the frontend
  - type: web
    name: realestate-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: realestate-backend
          property: host
      - key: GEMINI_API_KEY
        value: AIzaSyCQ2ThiZHK9Vjk-KX4Jgsr54G_qWlIoLOM

# --- Add-ons ---
databases:
  - name: realestate-db
    plan: free

